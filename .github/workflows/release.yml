name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version from tag
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building plugin version $version"

      - name: Build plugin
        run: ./gradlew -PpluginVersion=${{ steps.version.outputs.version }} buildPlugin --stacktrace

      - name: Locate plugin zip
        id: artifact
        run: |
          zip=$(ls build/distributions/flightdumpviewer-*.zip | head -n1)
          test -f "$zip" || { echo "Plugin zip not found"; exit 1; }
          echo "path=$zip" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$zip")" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.artifact.outputs.path }}
