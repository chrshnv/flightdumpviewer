name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve nightly version
        id: version
        run: |
          base=$(grep '^pluginVersion' gradle.properties | awk -F '= *' '{print $2}' | tr -d ' ')
          short_sha=${GITHUB_SHA::7}
          nightly="${base}-nightly-${short_sha}"
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "nightly=$nightly" >> "$GITHUB_OUTPUT"

      - name: Build & test
        run: ./gradlew -PpluginVersion=${{ steps.version.outputs.nightly }} test buildPlugin --stacktrace

      - name: Locate plugin zip
        id: artifact
        run: |
          zip="build/distributions/flightdumpviewer-${{ steps.version.outputs.nightly }}.zip"
          test -f "$zip" || { echo "Plugin zip not found at $zip"; ls -la build/distributions; exit 1; }
          stable="build/distributions/flightdumpviewer-nightly.zip"
          cp "$zip" "$stable"
          echo "versioned=$zip" >> "$GITHUB_OUTPUT"
          echo "stable=$stable" >> "$GITHUB_OUTPUT"

      # GitHub wraps uploaded files in a zip on download, so any zip becomes
      # a nested zip in the Actions UI. This artifact is for CI traceability
      # only; for an installable build use the `nightly` Release asset.
      - name: Upload workflow artifact (CI traceability — not installable directly)
        uses: actions/upload-artifact@v4
        with:
          name: ci-flightdumpviewer-${{ steps.version.outputs.nightly }}
          path: ${{ steps.artifact.outputs.versioned }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish nightly release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly build
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          target_commitish: ${{ github.sha }}
          body: |
            Built from `${{ github.sha }}` on ${{ github.event.head_commit.timestamp }}.

            Internal version: `${{ steps.version.outputs.nightly }}`.

            > **Heads up:** this tag is force-updated on every push to `main`. The asset
            > URL for the latest nightly is stable; the underlying commit changes.
          files: ${{ steps.artifact.outputs.stable }}
